<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Playyyy</title>
    <style>
        /* ============================================
           CSS CUSTOM PROPERTIES & VARIABLES (Exact from playyyy/style.css)
           ============================================ */
        :root {
            /* Color Palette */
            --color-primary: #00ff9d;
            --color-primary-dark: #00c77c;
            --color-primary-light: #c9ffe7;
            --color-primary-bg: rgba(0, 255, 157, 0.08);

            --color-bg: #070707;
            --color-bg-elevated: #101010;
            --color-bg-glass: rgba(255, 255, 255, 0.06);

            --color-text: #e8e8e8;
            --color-text-muted: rgba(232, 232, 232, 0.72);
            --color-text-inverse: #070707;

            --color-border: rgba(255, 255, 255, 0.08);
            --color-border-hover: rgba(0, 255, 157, 0.22);
            --color-border-glass: rgba(255, 255, 255, 0.12);

            /* Shadows */
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.25);
            --shadow-md: 0 12px 30px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 24px 50px rgba(0, 0, 0, 0.45);
            --shadow-glow: 0 0 25px rgba(0, 255, 157, 0.08);
            --shadow-glow-strong: 0 0 40px rgba(0, 255, 157, 0.15);

            /* Spacing */
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 2.5rem;
            --spacing-3xl: 3rem;

            /* Border Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 18px;
            --radius-full: 999px;

            /* Typography */
            --font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            --font-size-xs: 0.72rem;
            --font-size-sm: 0.85rem;
            --font-size-base: 1rem;
            --font-size-lg: 1.05rem;
            --font-size-xl: 1.25rem;
            --font-size-2xl: 1.35rem;
            --font-size-3xl: 1.8rem;
            --font-size-4xl: 2.8rem;

            /* Transitions */
            --transition-fast: 150ms ease;
            --transition-base: 250ms ease;
            --transition-slow: 350ms ease;
        }

        /* ============================================
           CSS RESET & BASE STYLES
           ============================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            min-height: 100vh;
            height: 100%;
            background:
                radial-gradient(
                    circle at top,
                    var(--color-primary-bg),
                    transparent 30%
                ),
                linear-gradient(
                    180deg,
                    #0d0d0d,
                    var(--color-bg)
                );
            color: var(--color-text);
            font-family: var(--font-family);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        /* ============================================
           404 PAGE STYLES (Compact, No Scroll)
           ============================================ */
        .page-container {
            max-width: 90%;
            width: 100%;
            padding: var(--spacing-xl);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100vh;
        }

        .error-header {
            text-align: center;
            padding: 0 0 var(--spacing-lg);
            margin-bottom: 0;
        }

        .error-brand {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            letter-spacing: -0.06em;
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
            margin-bottom: var(--spacing-xs);
        }

        .error-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: var(--font-size-base);
            font-weight: 500;
        }

        .error-content {
            background: var(--color-bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--color-border-glass);
            border-radius: var(--radius-lg);
            padding: var(--spacing-2xl);
            max-width: 500px;
            width: 100%;
            box-shadow: var(--shadow-md), var(--shadow-glow);
            margin-top: var(--spacing-md);
        }

        .error-code {
            font-size: var(--font-size-3xl);
            font-weight: 800;
            background: linear-gradient(
                90deg,
                var(--color-primary),
                var(--color-primary-dark)
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--spacing-sm);
            letter-spacing: -0.02em;
        }

        .error-title {
            font-size: var(--font-size-xl);
            color: #f2f2f2;
            margin-bottom: var(--spacing-sm);
        }

        .error-message {
            color: var(--color-text-muted);
            font-size: var(--font-size-base);
            margin-bottom: var(--spacing-lg);
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: calc(var(--spacing-sm) - 2px) var(--spacing-lg);
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            background: rgba(0, 255, 157, 0.12);
            color: var(--color-primary-light);
            text-decoration: none;
            font-weight: 600;
            font-size: var(--font-size-sm);
            transition: 
                transform var(--transition-fast),
                background var(--transition-fast),
                border-color var(--transition-fast),
                box-shadow var(--transition-fast);
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: rgba(0, 255, 157, 0.2);
            border-color: rgba(0, 255, 157, 0.4);
            box-shadow: 0 0 0 6px rgba(0, 255, 157, 0.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* ============================================
           RESPONSIVE DESIGN
           ============================================ */
        @media (max-width: 768px) {
            .page-container {
                padding: var(--spacing-lg);
            }
            .error-content {
                padding: var(--spacing-lg);
            }
            .error-code {
                font-size: var(--font-size-2xl);
            }
        }

        @media (max-width: 480px) {
            .error-brand {
                font-size: 2rem;
            }
            .error-code {
                font-size: var(--font-size-xl);
            }
            .error-title {
                font-size: var(--font-size-lg);
            }
            .error-message {
                font-size: var(--font-size-sm);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .btn:hover {
                transform: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <header class="error-header">
            <div class="error-brand">PLAYYYY</div>
            <p class="error-subtitle">Page not found</p>
        </header>
        
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">This page doesn't exist</h1>
            <p class="error-message">
                The page you're looking for might have been moved or deleted.
            </p>
            <a href="/playyyy/" class="btn">Go back home</a>
        </div>
    </div>
</body>
</html>
