<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>Playyyy</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1 id="game-title">Loading...</h1>
        <a href="index.html" style="color:#00ff9d; text-decoration:none;">← Back to Home</a>
        <button id="fullscreen-btn" onclick="toggleFullscreen()" style="background: none; border: none; color: #00ff9d; font-size: 1.2em; cursor: pointer; margin-left: 10px;">⛶</button>
    </header>

    <div id="game-container" class="glass">
        <iframe id="game-iframe" allowfullscreen></iframe>
        <div class="description" id="description"></div>
    </div>

    <script src="script.js"></script>
    <script>
        function toggleFullscreen() {
          const iframe = document.getElementById('game-iframe');
          if (!document.fullscreenElement) {
            iframe.requestFullscreen().catch(err => {
              console.error(`Error: ${err.message}`);
            });
          } else {
            document.exitFullscreen();
          }
        }
    </script>
</body>
</html>
