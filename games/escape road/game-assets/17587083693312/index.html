		var progressBarFull = document.querySelector("#progress_fill");
		var progress_text = document.querySelector(".gameloader-progress-info");
		let text_percent = "";
		var script = document.createElement("script");
		script.src = loaderUrl;
		script.onload = () => {
		createUnityInstance(canvas, config, (progress) => {
			progressElement.style.width = 100 * progress + "%";
			text_percent = "Downloading file: " + Math.round(progress*100) + "%";
			progress_text.innerText = text_percent;
			if (progress >= 99) {
				progress_text.innerText = "Game Loading ...";
			}
		}).then((unityInstance) => {
			window.unityInstance = unityInstance;
			setTimeout(function() {
				loadingBar.style.display = "none";
				window.focus();
			}, 2000);
			container.style.display = "block";
		}).catch((message) => {
			alert(message);
		});
		};
		document.body.appendChild(script);

		}
		let time_counter_gm=0;
		function gmRepeatEvery30Seconds() {
		  setInterval(function() {
			if(config.eventLog){
				firebaseLogEvent("time_countergm_"+time_counter_gm++);
			}
		  }, 30000);
		}
		gmRepeatEvery30Seconds();
		var lastSentDiem = 0,
	    gameStartTime = 0,
	    currentScore = 0;
	    function sendScore (score, gameData = {}) {
	        try {
	            const message = {
	                type: 'GAME_SCORE',
	                data: {
	                score: score,
	                gameData: {
	                    level: gameData.level || 1,
	                    time: gameData.time || Math.floor((Date.now() - gameStartTime) / 1000),
	                    lives: gameData.lives || 0,
	                    ...gameData
	                }
	                }
	            };
	            if (window.parent && window.parent !== window) {
	                window.parent.postMessage(message, '*');
	                console.log('Score sent to parent:', score, message);
	            } else {
	                console.log('Score logged (no parent):', score);
	            }
	        } catch (error) {
	        console.error('Error sending score:', error);
	        }
	    };
	    function sendFinalDiem (score, gameData = {}) {
	        try {
	            if (!Number.isInteger(score) || score <= currentScore) {
	                return;
	            }
	            currentScore = score;
	            sendScore(score, {
	                ...gameData,
	                isFinalScore: true,
	                gameTime: Math.floor((Date.now() - gameStartTime) / 1000)
	            });
	        } catch (error) {
	        console.error('Error sending final score:', error);
	        }
	    };
			(function () {
	    const TARGET_URL =

	    const originalFetch = window.fetch;
	    window.fetch = function () {
	        return originalFetch.apply(this, arguments).then(response => {
	            try {
	                const url = response.url || "";
	                if (url.startsWith(TARGET_URL)) {
	                    const clone = response.clone();
	                    clone.json().then(data => {
	                        if (data && typeof data.score !== "undefined") {

	                        }
	                    }).catch(() => {});
	                }
	            } catch (e) {}
	            return response;
	        });
	    };
