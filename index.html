<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Playyyy - Games</title>
    <link rel="stylesheet" href="style.css">
    <!-- Default Statcounter code for playyyy - game site
    https://louis141414.github.io/playyyy -->
    <script type="text/javascript">
        var sc_project=13299407;
        var sc_invisible=0;
        var sc_security="d0abe929";
        var scJsHost = "https://";
        document.write("<sc"+"ript type='text/javascript' src='" +
        scJsHost+
        "statcounter.com/counter/counter.js'></"+"script>");
    </script>
</head>

<body>
    <header>
        <h1>🎮 Playyyy</h1>
        <p>100+ Best Browser Games</p>
    </header>

    <div style="text-align:center;">
        <img src="https://img.shields.io/github/last-commit/louis141414/playyyy?label=Last%20update" alt="Last update">
    </div>

    <a href="https://github.com/louis141414/playyyy/issues" target="_blank" rel="noopener noreferrer" style="text-decoration:none;display:inline-block;">
        <svg xmlns="http://www.w3.org/2000/svg" width="140" height="36" viewBox="0 0 140 36" role="img" aria-label="Report an issue">
            <rect width="140" height="36" rx="8" fill="#0b1220" opacity="0.95"/>
            <rect x="2" y="2" width="136" height="32" rx="6" fill="rgba(255,255,255,0.03)"/>
            <text x="70" y="22" fill="#e6f7ff" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Report an issue</text>
        </svg>
    </a>

    <section class="controls glass">
        <label class="search-wrap" for="search-input">
            <span>Search games</span>
            <input id="search-input" type="search" placeholder="Type a game name..." autocomplete="off">
        </label>
    </section>

    <section class="favorites-section">
        <div class="section-title">
            <h2>Favorites</h2>
            <p>Your saved games</p>
        </div>
        <div class="grid favorites-grid" id="favorites-grid"></div>
    </section>

    <section class="all-games-section">
        <div class="section-title">
            <h2>All Games</h2>
            <p>Tap the star to save a game</p>
        </div>
        <div class="grid" id="grid"></div>
    </section>

    <script src="script.js"></script>
</body>

</html>
