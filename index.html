<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Playyyy - Games</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="intro" id="intro">
        <div class="brand" id="brand">PLAYYYY</div>
        <div class="subtitle" id="subtitle">Discover and play instantly.</div>
        <div class="loader" id="loader">
            <div class="bar">
                <div class="fill" id="fill"></div>
            </div>
            <div class="status" id="status">Loading...</div>
        </div>
    </div>

    <header>
        <h1>🎮 Playyyy</h1>
        <p>100+ Best Browser Games</p>
    </header>

    <div style="text-align:center;">
        <a href="https://statcounter.com/p13299407/?guest=1">->Stats</a>
        <img src="https://img.shields.io/github/last-commit/louis141414/playyyy?label=Last%20update" alt="Last update">
    </div>

    <section class="controls glass">
        <label class="search-wrap" for="search-input">
            <span>Search games</span>
            <input id="search-input" type="search" placeholder="Type a game name..." autocomplete="off">
        </label>
    </section>

    <section class="favorites-section">
        <div class="section-title">
            <h2>Favorites</h2>
            <p>Your saved games</p>
        </div>
        <div class="grid favorites-grid" id="favorites-grid"></div>
    </section>

    <section class="all-games-section">
        <div class="section-title">
            <h2>All Games</h2>
            <p>Tap the star to save a game</p>
        </div>
        <div class="grid" id="grid"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
